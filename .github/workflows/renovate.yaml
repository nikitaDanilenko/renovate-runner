name: Renovate

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract Repositories from config.js
        id: repos
        run: |
          list=$(node -e "const c = require('./config.js'); console.log(c.repositories.map(r => r.split('/')[1]).join(','));")
          echo "list=$list" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RENOVATE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_BOT_PRIVATE_KEY }}
          owner: nikitaDanilenko
          repositories: ${{ steps.repos.outputs.list }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-workflows: write
          permission-vulnerability-alerts: read

      - name: Run Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        env:
          LOG_LEVEL: 'info'
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: 'false'
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: config.js
